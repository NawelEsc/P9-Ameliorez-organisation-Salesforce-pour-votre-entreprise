<!--
    Composant : orders
    Description : Affiche le montant total des commandes "Activated"
                  du compte courant. Affiche un message d'erreur
                  si aucune commande ou montant = 0.
-->
<template>
    <template if:false={sumOrdersOfCurrentAccount}>
        <div class="slds-box slds-theme_error">
            <h1>Erreur, pas de commandes rattachées à ce compte ou le montant des commandes est égal à 0.</h1>
        </div>
    </template>
    <template if:true={sumOrdersOfCurrentAccount}>
        <div class="slds-box slds-theme_success">
            <h1>Total des Commandes : {sumOrdersOfCurrentAccount}</h1>
        </div>
    </template>
</template>
